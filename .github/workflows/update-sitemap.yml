name: Update sitemap lastmod

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update lastmod date
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|<lastmod>.*</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet sitemap.xml || (git add sitemap.xml && git commit -m "chore: update sitemap lastmod to ${TODAY}" && git push)
        env:
          TODAY: $(date -u +%Y-%m-%d)
